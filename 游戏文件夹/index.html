<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>考公模拟器 · 人物事件版</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #0a1a2f;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', Roboto, sans-serif;
            padding: 16px;
            position: relative;
        }
        .game-container {
            max-width: 750px;
            width: 100%;
            background: #0e2a3a;
            border-radius: 40px;
            padding: 24px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.8);
            color: #f0f4f8;
            border: 1px solid #2c4a6e;
            position: relative;
            z-index: 2;
        }
        .career-selector {
            background: #1a3349;
            border-radius: 30px;
            padding: 15px;
            margin-bottom: 20px;
        }
        .career-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            justify-content: center;
        }
        .career-badge {
            background: #2d4b65;
            padding: 6px 12px;
            border-radius: 40px;
            cursor: pointer;
            transition: 0.2s;
            border: 2px solid transparent;
            font-size: 0.9rem;
            color: white;
        }
        .career-badge.selected {
            background: #e6b450;
            color: #1e2b3c;
            border-color: white;
            font-weight: bold;
        }
        .career-badge:hover {
            transform: translateY(-2px);
            background: #3e5f7a;
        }
        .stats-bar {
            background: #1a3349;
            border-radius: 30px;
            padding: 20px;
            margin-bottom: 20px;
        }
        .stat-row {
            display: flex;
            align-items: center;
            margin-bottom: 12px;
            gap: 8px;
        }
        .stat-label {
            width: 65px;
            font-weight: 600;
            color: #ffd78c;
            display: flex;
            align-items: center;
            gap: 5px;
        }
        .progress-bg {
            flex: 1;
            height: 20px;
            background: #2e3b4e;
            border-radius: 30px;
            overflow: hidden;
        }
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #ffb86b, #ffdd99);
            border-radius: 30px;
            transition: width 0.2s;
        }
        .stat-value {
            min-width: 45px;
            text-align: right;
            font-weight: 700;
        }
        .meta-panel {
            display: flex;
            justify-content: space-between;
            background: #0e2a3a;
            border-radius: 50px;
            padding: 12px 20px;
            margin-top: 12px;
            flex-wrap: wrap;
            gap: 10px;
        }
        .coin { color: #f9d77e; font-weight: bold; }
        .luck { color: #a3d8ff; font-weight: bold; }
        .day { background: #2f4858; padding: 5px 20px; border-radius: 40px; }
        .stage-info { background: #2d4b65; padding: 5px 20px; border-radius: 40px; color: #ffd966; }

        /* ===== CSS拟物化头像 ===== */
        .character-avatar {
            display: flex;
            align-items: center;
            background: #1a3349;
            border-radius: 50px;
            padding: 8px 20px;
            margin: 15px 0;
            border-left: 5px solid #e6b450;
        }
        .css-avatar {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            position: relative;
            overflow: hidden;
            border: 3px solid white;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            margin-right: 15px;
        }
        .avatar-bg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }
        .face {
            position: absolute;
            bottom: 15px;
            left: 50%;
            transform: translateX(-50%);
            width: 40px;
            height: 25px;
            background: #f1c40f;
            border-radius: 50% 50% 40% 40%;
        }
        .eye-left, .eye-right {
            position: absolute;
            top: 25px;
            width: 8px;
            height: 8px;
            background: #2c3e50;
            border-radius: 50%;
        }
        .eye-left { left: 20px; }
        .eye-right { right: 20px; }
        .glasses {
            position: absolute;
            top: 22px;
            left: 12px;
            width: 56px;
            height: 20px;
            border: 2px solid #7f8c8d;
            border-radius: 10px;
            background: transparent;
        }
        .hair-mother {
            position: absolute;
            top: 5px;
            left: 10px;
            width: 60px;
            height: 30px;
            background: #8e44ad;
            border-radius: 30px 30px 10px 10px;
        }
        .glasses-black {
            border: 3px solid #2c3e50;
        }
        .hair-zhangfan {
            position: absolute;
            top: 2px;
            left: 15px;
            width: 50px;
            height: 25px;
            background: #27ae60;
            border-radius: 40% 40% 0 0;
        }
        .lips {
            position: absolute;
            bottom: 8px;
            left: 32px;
            width: 16px;
            height: 6px;
            background: #e74c3c;
            border-radius: 0 0 10px 10px;
        }
        .beard {
            position: absolute;
            bottom: 5px;
            left: 28px;
            width: 24px;
            height: 10px;
            background: #7f8c8d;
            border-radius: 5px;
            opacity: 0.5;
        }
        .hair-qinqi {
            position: absolute;
            top: 0;
            left: 10px;
            width: 60px;
            height: 35px;
            background: #f39c12;
            border-radius: 50% 50% 20% 20%;
        }

        .avatar-name {
            font-size: 1.5rem;
            font-weight: 600;
            color: #ffd966;
        }
        .avatar-desc {
            font-size: 0.9rem;
            opacity: 0.8;
        }

        .dialog-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        .dialog-box {
            background: #1e3a5f;
            border: 4px solid #e6b450;
            border-radius: 40px;
            padding: 35px 30px;
            max-width: 500px;
            width: 90%;
            box-shadow: 0 25px 50px rgba(0,0,0,0.9);
            color: white;
            text-align: center;
        }
        .dialog-character {
            font-size: 4rem;
            margin-bottom: 10px;
        }
        .dialog-name {
            font-size: 1.8rem;
            color: #ffd966;
            margin-bottom: 15px;
            font-weight: bold;
        }
        .dialog-text {
            font-size: 1.4rem;
            line-height: 1.6;
            margin: 20px 0;
            padding: 25px;
            background: #0e2a3a;
            border-radius: 30px;
            text-align: left;
            white-space: pre-line;
        }
        .dialog-close {
            background: #e6b450;
            color: #1e2b3c;
            border: none;
            padding: 14px 35px;
            border-radius: 50px;
            font-size: 1.2rem;
            font-weight: bold;
            cursor: pointer;
            margin-top: 15px;
        }

        .options-area {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin: 20px 0;
        }
        .option-btn {
            background: #2d4b65;
            border: 2px solid #4a6a8a;
            color: white;
            padding: 16px 20px;
            border-radius: 50px;
            font-size: 1.1rem;
            text-align: left;
            cursor: pointer;
            transition: 0.1s;
        }
        .option-btn:hover {
            background: #3e5f7a;
            border-color: #ffbc6c;
        }

        .joke-box {
            background: #1a3349;
            border: 1px dashed #ffbc6c;
            border-radius: 30px;
            padding: 12px;
            margin: 15px 0;
            color: #ffd966;
            text-align: center;
            font-size: 1rem;
        }

        .restart-btn {
            background: #2d4b65;
            border: none;
            color: white;
            padding: 12px 30px;
            border-radius: 40px;
            font-weight: 600;
            width: 100%;
            cursor: pointer;
            margin-top: 10px;
        }

        .resource-bar {
            display: flex;
            gap: 10px;
            margin: 15px 0;
        }
        .resource-btn {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 40px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            color: white;
            transition: 0.2s;
        }
        .resource-btn:hover {
            transform: translateY(-2px);
            filter: brightness(1.1);
        }
        .coin-btn { background: #b8860b; }
        .luck-btn { background: #2e8b57; }

        #fireworksCanvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 999;
            display: none;
        }
        
        /* 广告招商区域 */
        .ad-container {
            background: linear-gradient(135deg, #ffd966, #f9d77e);
            border-radius: 30px;
            padding: 20px;
            margin: 20px 0;
            text-align: center;
            box-shadow: 0 8px 20px rgba(0,0,0,0.2);
        }
        .ad-title {
            font-size: 1.2rem;
            font-weight: bold;
            color: #1e3a5f;
            margin-bottom: 10px;
        }
        .ad-wechat {
            font-size: 1.1rem;
            font-weight: 600;
            color: #e74c3c;
            background: white;
            padding: 10px 20px;
            border-radius: 50px;
            display: inline-block;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }
        .ad-desc {
            font-size: 0.9rem;
            color: #1e3a5f;
            margin-top: 10px;
            opacity: 0.8;
        }
        
        /* 弹幕容器（滚动区域） */
        .danmaku-container {
            position: relative;
            width: 100%;
            height: 50px;
            overflow: hidden;
            margin: 10px 0;
            background: rgba(10, 26, 47, 0.6); /* 半透明深蓝 */
            border-radius: 30px;
            border: 1px solid #e6b450;
        }
        
        /* 单条弹幕样式 */
        .danmaku-item {
            position: absolute;
            white-space: nowrap;
            font-size: 1rem;
            font-weight: 500;
            padding: 6px 14px;
            border-radius: 40px;
            background: linear-gradient(145deg, #ffd966, #e6b450); /* 金色渐变 */
            color: #1e2b3c;
            box-shadow: 0 4px 12px rgba(230, 180, 80, 0.4);
            border: 2px solid #fff3e0;
            animation: danmaku-scroll 10s linear infinite;
            display: flex;
            align-items: center;
            gap: 8px;
            z-index: 10;
            top: 8px; /* 可根据需要调整位置 */
        }
        
        /* 滚动动画 */
        @keyframes danmaku-scroll {
            0% { transform: translateX(100vw); }
            100% { transform: translateX(-100%); }
        }
        
        /* 不同颜色变体（可选） */
        .danmaku-warning {
            background: linear-gradient(145deg, #ffb6b6, #ff6b6b);
            color: #fff;
            border-color: #fff;
        }
        .danmaku-success {
            background: linear-gradient(145deg, #b0e9b0, #51cf66);
            color: #1e2b3c;
        }
        .danmaku-info {
            background: linear-gradient(145deg, #a3d8ff, #339af0);
            color: #1e2b3c;
        }
    </style>
</head>
<body>
<canvas id="fireworksCanvas"></canvas>
<div class="game-container">
    <!-- 岗位选择器 -->
    <div class="career-selector">
        <div style="margin-bottom: 10px; color: #ffd78c;">🎯 选岗如投胎，谨慎选择：</div>
        <div class="career-grid" id="careerGrid">
            <span class="career-badge selected" data-career="guokao">🏛️ 国考</span>
            <span class="career-badge" data-career="shengkao">📜 省考</span>
            <span class="career-badge" data-career="shiye">📚 事业编</span>
            <span class="career-badge" data-career="jiaoshi">🍎 教师</span>
            <span class="career-badge" data-career="junwen">🪖 军队文职</span>
            <span class="career-badge" data-career="chunzhao">💼 春招</span>
            <span class="career-badge" data-career="sanzi">🏞️ 三支一扶</span>
            <span class="career-badge" data-career="yancao">🚬 烟草/国企</span>
            <span class="career-badge" data-career="yiyuan">🏥 医院行政</span>
            <span class="career-badge" data-career="shequ">📦 社区</span>
            <span class="career-badge" data-career="haiguan">✈️ 海关/税务</span>
        </div>
    </div>

    <!-- 弹幕容器 -->
    <div class="danmaku-container" id="danmakuContainer"></div>

    <!-- 属性栏 -->
    <div class="stats-bar">
        <div class="stat-row"><span class="stat-label"><i class="fas fa-pencil-alt"></i>行测</span><div class="progress-bg"><div class="progress-fill" id="xingceFill" style="width: 60%"></div></div><span class="stat-value" id="xingceVal">60</span></div>
        <div class="stat-row"><span class="stat-label"><i class="fas fa-feather-alt"></i>申论</span><div class="progress-bg"><div class="progress-fill" id="shenlunFill" style="width: 50%"></div></div><span class="stat-value" id="shenlunVal">50</span></div>
        <div class="stat-row"><span class="stat-label"><i class="fas fa-heart"></i>心态</span><div class="progress-bg"><div class="progress-fill" id="xintaiFill" style="width: 70%"></div></div><span class="stat-value" id="xintaiVal">70</span></div>
        <div class="stat-row"><span class="stat-label"><i class="fas fa-dumbbell"></i>健康</span><div class="progress-bg"><div class="progress-fill" id="jiankangFill" style="width: 60%"></div></div><span class="stat-value" id="jiankangVal">60</span></div>
        <div class="meta-panel">
            <span class="coin"><i class="fas fa-coins"></i><span id="coinVal">500</span></span>
            <span class="luck"><i class="fas fa-star"></i>幸运 <span id="luckVal">50</span></span>
            <span class="stage-info">🎯 阶段 <span id="stageName">选岗</span></span>
            <span class="day">📅 天数 <span id="dayVal">1</span>/<span id="totalDaysVal">30</span></span>
        </div>
    </div>

    <!-- CSS头像区域 -->
    <div class="character-avatar" id="characterBox">
        <div class="css-avatar" id="cssAvatar">
            <div class="avatar-bg" id="avatarBg" style="background: #95a5a6;"></div>
        </div>
        <div>
            <div class="avatar-name" id="avatarName">系统</div>
            <div class="avatar-desc" id="avatarDesc">今日事件</div>
        </div>
    </div>

    <!-- 梗区/备考心得区 -->
    <div class="joke-box" id="jokeBox">📚 行测刷题：每天坚持40分钟资料分析，正确率稳定在90%以上再考虑提速。</div>

    <!-- 资源兑换按钮 -->
    <div class="resource-bar">
        <button class="resource-btn coin-btn" id="buyAttributeBtn">💰 花100金币换属性</button>
        <button class="resource-btn luck-btn" id="useLuckBtn">🍀 花20幸运换健康/心态</button>
    </div>

    <!-- 商店道具 -->
    <div class="resource-bar">
        <button class="resource-btn" style="background: #e74c3c;" id="buyRedBullBtn">🥤 红牛牛 (30币)</button>
        <button class="resource-btn" style="background: #3498db;" id="buySoupBtn">🍲 心灵鸡汤 (30币)</button>
        <button class="resource-btn" style="background: #2ecc71;" id="buyNotebookBtn">📒 错题本 (50币)</button>
    </div>

    <!-- 选项按钮区域 -->
    <div class="options-area" id="optionsContainer"></div>

    <!-- 广告招商区域 -->
    <div class="ad-container" style="padding: 15px; margin: 10px 0;">
        <div class="ad-title" style="font-size: 1rem;">📢 广告招商</div>
        <div class="ad-wechat" style="font-size: 1rem;">微信号：HUAlide0947</div>
        <div class="ad-desc" style="font-size: 0.8rem;">欢迎考公相关产品合作</div>
    </div>

    <!-- 音乐控制按钮 -->
    <div class="resource-bar">
        <button class="resource-btn" style="background: #9b59b6;" id="musicBtn">🎵 音乐: 开</button>
    </div>

    <!-- 重置按钮 -->
    <button class="restart-btn" id="restartBtn">🔄 重开考公路</button>

    <!-- 音频元素 -->
    <audio id="bgm" loop>
        <source src="" type="audio/mpeg">
    </audio>
    <audio id="clickSound" preload="auto">
        <source src="" type="audio/mpeg">
    </audio>
    <audio id="popupSound" preload="auto">
        <source src="" type="audio/mpeg">
    </audio>
    <audio id="levelUpSound" preload="auto">
        <source src="" type="audio/mpeg">
    </audio>

    <!-- 弹窗 -->
    <div class="dialog-overlay" id="dialogOverlay">
        <div class="dialog-box" id="dialogBox">
            <div class="dialog-character" id="dialogCharacter">👤</div>
            <div class="dialog-name" id="dialogName">系统</div>
            <div class="dialog-text" id="dialogText"></div>
            <button class="dialog-close" id="dialogCloseBtn">继续</button>
        </div>
    </div>
</div>

<script>
    // ========== 事件库（完整三关事件） ==========
    const gameEvents = {
        // 第一关：选岗阶段（30天）
        选岗: [
            // 新手引导事件（前三天）
            {
                id: 'guide1',
                character: '严厉母亲',
                characterId: 0,
                characterEmoji: '👩',
                desc: '孩子，准备考公了？我来教你一些基本常识。看上面的四个属性：行测、申论、心态、健康。行测和申论是考试分数的关键，心态影响你的学习效率，健康决定你能否坚持到最后。',
                options: [
                    { text: 'A. 认真听母亲讲解', effects: { xintai: 2, luck: 2 } },
                    { text: 'B. 敷衍应付', effects: { xintai: -1 } }
                ],
                failure: null,
                achievement: null,
                isGuide: true,
                day: 1
            },
            {
                id: 'guide2',
                character: '乐观考友',
                characterId: 1,
                characterEmoji: '👨‍🎓',
                desc: '嘿，战友！看到下面的商店了吗？你可以用金币购买红牛、心灵鸡汤和错题本，这些都能提升你的属性。还有那个幸运值，关键时刻能帮你逢凶化吉！',
                options: [
                    { text: 'A. 感谢考友的建议', effects: { xintai: 2, luck: 1 } },
                    { text: 'B. 觉得他在废话', effects: { xintai: -1 } }
                ],
                failure: null,
                achievement: null,
                isGuide: true,
                day: 2
            },
            {
                id: 'guide3',
                character: '暖心室友',
                characterId: 3,
                characterEmoji: '👥',
                desc: '兄弟，我跟你说，游戏里会有各种事件，你的选择会影响属性。完成某些目标还能获得成就，成就越多，上岸几率越大！对了，每天还有备考心得，记得看看。',
                options: [
                    { text: 'A. 记下室友的话', effects: { xintai: 2, luck: 1 } },
                    { text: 'B. 不以为然', effects: { xintai: -1 } }
                ],
                failure: null,
                achievement: null,
                isGuide: true,
                day: 3
            },
            // 常规事件
            {
                id: 'event1',
                character: '严厉母亲',
                characterId: 0,
                characterEmoji: '👩',
                desc: '考试公告终于发布了！你需要仔细阅读公告，了解报名条件和岗位要求。',
                options: [
                    { text: 'A. 仔细研读公告，做好笔记', effects: { xintai: 1, luck: 1 } },
                    { text: 'B. 大概看一下，等别人分析', effects: { xintai: -3, luck: -5 } }
                ],
                failure: null,
                achievement: null
            },
            {
                id: 'event2',
                character: '乐观考友',
                characterId: 1,
                characterEmoji: '👨‍🎓',
                desc: '面对成百上千个岗位，你需要根据自己的专业、学历、兴趣等条件进行筛选。',
                options: [
                    { text: 'A. 严格筛选，只选最适合的', effects: { xintai: 1, luck: 2 } },
                    { text: 'B. 先报名热门岗位再说', effects: { xintai: -3, luck: -3 } }
                ],
                failure: null,
                achievement: null
            },
            {
                id: 'event3',
                character: '凡尔赛对手',
                characterId: 2,
                characterEmoji: '🦚',
                desc: '考友们在群里热烈讨论各个岗位的竞争激烈程度，有人说这个岗位好，有人说那个岗位容易考。',
                options: [
                    { text: 'A. 参考大家的意见，但自己做决定', effects: { xintai: 2, luck: 2 } },
                    { text: 'B. 跟风选大家都报的岗位', effects: { xintai: -3, luck: -3 } }
                ],
                failure: null,
                achievement: null
            },
            {
                id: 'event4',
                character: '暖心室友',

    // Web Audio API 音频上下文
    let audioContext;
    function getAudioContext() {
        if (!audioContext) {
            audioContext = new (window.AudioContext || window.webkitAudioContext)();
        }
        // 确保音频上下文处于活动状态
        if (audioContext.state === 'suspended') {
            audioContext.resume();
        }
        return audioContext;
    }

    // 原函数: generateSound
    function _f0(_v0, _v1, _v2 = 'sine') {
        const _v3 = getAudioContext();
        const _v4 = _v3.createOscillator();
        const _v5 = _v3.createGain();
        
        _v4.type = _v2;
        _v4.frequency.value = _v0;
        
        _v5.gain.setValueAtTime(0.1, _v3.currentTime);
        _v5.gain.exponentialRampToValueAtTime(0.01, _v3.currentTime + _v1);
        
        _v4.connect(_v5);
        _v5.connect(_v3.destination);
        
        _v4.start(_v3.currentTime);
        _v4.stop(_v3.currentTime + _v1);
    }

    // 音乐控制函数
    function playBGM(stage) {
        if (!state.musicEnabled) return;
        
        const musicUrl = musicUrls[stage] || musicUrls.选岗;
        
        // 只有在以下情况才重新播放音乐：
        // 1. 音乐未在播放
        // 2. 阶段发生了变化
        // 3. 音乐源未设置
        if (bgm.paused || currentPlayingStage !== stage || !bgm.src) {
            currentPlayingStage = stage;
            bgm.src = musicUrl;
            bgm.play().catch(e => console.log('BGM播放失败:', e));
            console.log('BGM播放:', stage);
        }
    }

    function toggleMusic() {
        state.musicEnabled = !state.musicEnabled;
        const musicBtn = document.getElementById('musicBtn');
        
        if (state.musicEnabled) {
            musicBtn.textContent = '🎵 音乐: 开';
            playBGM(state.currentStage);
        } else {
            musicBtn.textContent = '🎵 音乐: 关';
            // 停止所有音频
            bgm.pause();
            clickSound.pause();
            popupSound.pause();
            levelUpSound.pause();
        }
    }

    // 音效播放函数
    function playSound(soundType) {
        // 音效始终播放，不受音乐开关影响
        
        // 使用Web Audio API生成简单的音效
        switch (soundType) {
            case 'click':
                _f0(880, 0.1, 'square');
                break;
            case 'popup':
                _f0(660, 0.2, 'sine');
                break;
            case 'levelUp':
                _f0(440, 0.1, 'sine');
                setTimeout(() => _f0(880, 0.1, 'sine'), 100);
                setTimeout(() => _f0(1320, 0.1, 'sine'), 200);
                break;
            default:
                return;
        }
        
        console.log('音效播放:', soundType);
    }

                            if (useLuck.text.includes('是')) {
                                applyEffects(useLuck.effects);
                            } else {

                                gameLoop();

                            }

                            state.currentStage = '结局';
                            gameLoop();
                            return;
                        }
                    }

            }
            
            // 体检阶段结束成就

            await showDialog('🎉', '体检通过', '恭喜通过体检！获得成就：健康卫士\n健康+10');
            state.体检通过 = true;
            
            // 政审前幸运值使用：购买人脉协助

                    await showDialog('✅', '政审通过', '在人脉协助下，政审顺利通过！');

                    if (state.政审谈话风险 && state.luck < 30) {
                        // 追加幸运值使用
                        if (state.luck >= 20) {

                                return;

                                await showDialog('❌', '政审失败', '档案问题未解决...', true, '政审档案问题未解决');

    // 结局处理
    async function handleEnding() {
        if (state.achievements.includes('上岸')) {
            startFireworks();
            await showDialog('🎊', '成功上岸', '恭喜你成为一名公务员！\n你的考公之路圆满结束！');
        } else if (state.xintai < 30 && state.jiankang < 30) {
            // 放弃考公创业
            state.achievements.push('创业先锋');
            await showDialog('💼', '放弃考公创业', '你意识到考公并不是唯一的出路，决定放弃考公，开始创业。\n经过努力，你创办了自己的公司，成为了一名成功的企业家！\n获得成就：创业先锋');
        } else if (state.笔试排名 > 50) {
            // 考公失败后考编
            state.achievements.push('曲线救国');
            await showDialog('📚', '考公失败后考编', '考公失败后，你决定曲线救国，报考了事业单位。\n凭借你的努力，你成功上岸事业单位，开启了新的职业生涯！\n获得成就：曲线救国');
        } else if (state.xintai > 80 && state.luck > 70) {
            // 结婚生子
            state.achievements.push('人生赢家');
            await showDialog('👨‍👩‍👧‍👦', '结婚生子', '在备考过程中，你遇到了生命中的另一半，决定结婚生子。\n虽然没有考上公务员，但你拥有了幸福的家庭，成为了人生赢家！\n获得成就：人生赢家');
        } else {
            await showDialog('😔', '再接再厉', '这次没有成功，不要灰心，继续努力！\n下次一定能够上岸！');
        }
    }
    
    // 处理单个事件
    async function processEvent(event) {
        // 检查事件条件
        if (event.condition && !event.condition()) {
            return;
        }
        
        // 检查岗位专属事件
        if (event.career && event.career !== state.currentCareer) {
            return;
        }
        
        // 更新头像和信息
        updateAvatar(event.character);
        document.getElementById('avatarName').innerText = event.character;
        document.getElementById('avatarDesc').innerText = '事件';
        
        // 显示事件对话框
        await showDialog(event.characterEmoji, event.character, event.desc);
        
        // 处理无选项事件（如笔试）
        if (event.options.length === 0) {
            if (event.id === 'eventP1') {
                // 计算笔试分数
                const career = careers[state.currentCareer];
                const interviewTotalScore = career.baseRatio;
                const totalAttributes = state.xingce + state.shenlun + state.xintai + state.jiankang;
                state.笔试分数 = (totalAttributes / 400) * interviewTotalScore + 10;
                state.笔试分数 = Math.max(0, Math.min(100, state.笔试分数));
                
                // 计算排名和进面（幸运值影响排名区间）
                const luckBonus = Math.floor(state.luck / 10); // 每10点幸运值减少5个排名
                const maxRank = Math.max(10, 50 - luckBonus * 5); // 最低排名区间1-10
                state.笔试排名 = Math.floor(Math.random() * maxRank) + 1;
                state.进面 = state.笔试排名 <= 10 || (state.笔试分数 >= 80 && Math.random() < 0.9);
                
                await showDialog('⏳', '出成绩', `你的笔试分数：${state.笔试分数.toFixed(1)}，排名第${state.笔试排名}`);
                
                if (state.进面) {
                    state.achievements.push('笔试闯关成功');
                    state.luck = Math.min(100, state.luck + 5);
                    await showDialog('🎉', '进面成功', '恭喜你进入面试！获得成就：笔试闯关成功\n幸运+5');
                } else {
                    await showDialog('😭', '落榜', '你没有进入面试...');
                }
            }
            return;
        }
        
        // 显示选项
        const choice = await showOptions(event.options);
        
        // 检查余额不足情况
        if (choice.effects.coin && choice.effects.coin < 0 && state.coin < Math.abs(choice.effects.coin)) {
            await showDialog('💰', '余额不足', '你的金币不够！');
            return;
        }
        
        // 检查幸运值不足情况
        if (choice.effects.luck && choice.effects.luck < 0 && state.luck < Math.abs(choice.effects.luck)) {
            await showDialog('🍀', '幸运值不足', '你的幸运值不够！');
            return;
        }
        
        // 应用效果（包含幸运值修正）
        const finalEffects = { ...choice.effects };
        
        // 幸运值修正：当幸运值高于70时，获得额外加成
        if (state.luck > 70) {
            // 为属性类效果添加额外加成
            if (finalEffects.xingce) finalEffects.xingce += 1;
            if (finalEffects.shenlun) finalEffects.shenlun += 1;
            if (finalEffects.xintai) finalEffects.xintai += 1;
            if (finalEffects.jiankang) finalEffects.jiankang += 1;
            if (finalEffects.luck) finalEffects.luck += 1;
            
            // 为面试相关属性添加额外加成
            if (finalEffects.面试评分) finalEffects.面试评分 += 2;
            if (finalEffects.考官印象) finalEffects.考官印象 += 2;
            if (finalEffects.试讲评分) finalEffects.试讲评分 += 2;
            if (finalEffects.主任印象) finalEffects.主任印象 += 2;
        }
        
        applyEffects(finalEffects);
        
        // 检查是否花费幸运值确保上岸
        if (event.id === 'eventF1' && choice.text.includes('花费15幸运值')) {
            // 确保上岸成功
            state.achievements.push('成功上岸');
        }
        
        // 检查特殊条件（如爸爸给钱事件）
        if (event.id === 'event24' && choice.text.includes('收钱')) {
            state.dadMoneyGiven = true;
        }
        
        // 检查熬夜事件
        if (event.id === 'event9' && choice.text.includes('通宵学习')) {
            state.consecutiveOvernightDays++;
        } else if (event.id === 'event9' && choice.text.includes('合理安排时间')) {
            state.consecutiveOvernightDays = 0;
        }
        
        // 检查成就
        if (event.achievement) {
            state.achievements.push(event.achievement);
        }
    }
